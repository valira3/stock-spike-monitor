name: Refresh data feeds (VIX + earnings)

# Pulls fresh VIX daily history from the datahub.io GitHub mirror, runs
# the yfinance-backed earnings fetcher for the v8/v9/v10 12-ticker
# universe, and commits any changes back to main. GHA runners have full
# internet access so Yahoo Finance / yfinance work here even though
# they're sandbox-blocked in Claude Code sessions.
#
# Triggers:
#   1. workflow_dispatch (UI/manual) with optional knobs.
#   2. schedule: daily at 12:00 UTC (07:00 ET, well before pre-market).
#      Cheap (<2 min); idempotent (commits only on diff).
#
# Look-ahead audit (rule #7b): both feeds are public schedules /
# historical closes. Refreshing the cache is causally clean -- the
# orb_backtest only reads prior-session VIX and announced-in-advance
# earnings dates.
#
# Cost: ~1 minute of GHA runner time per run, well within the 2,000
# free min/month budget shared with lever-sweep workflows.

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Earnings lookback window (days before today)'
        required: false
        default: '90'
      lookahead_days:
        description: 'Earnings lookahead window (days after today)'
        required: false
        default: '180'
      skip_vix:
        description: 'Skip VIX refresh (true/false)'
        required: false
        default: 'false'
      skip_earnings:
        description: 'Skip earnings refresh (true/false)'
        required: false
        default: 'false'
  schedule:
    # Daily at 12:00 UTC = 07:00 ET. Before pre-market opens at 04:00 ET
    # next session. Datahub VIX CSV updates within hours of the prior
    # session close.
    - cron: '0 12 * * *'

permissions:
  contents: write  # commit refreshed CSV/calendar back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use a token that can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install yfinance
        if: ${{ inputs.skip_earnings != 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Refresh VIX daily history
        if: ${{ inputs.skip_vix != 'true' }}
        run: |
          mkdir -p data/external
          curl -sSf -o data/external/vix-daily.csv \
            https://raw.githubusercontent.com/datasets/finance-vix/master/data/vix-daily.csv
          rows=$(wc -l < data/external/vix-daily.csv)
          echo "VIX CSV: $rows rows"
          # Sanity: must be > 8000 rows (full history) and end recently
          if [ "$rows" -lt 8000 ]; then
            echo "::error::VIX CSV has only $rows rows; expected >8000"
            exit 1
          fi
          tail -3 data/external/vix-daily.csv

      - name: Refresh earnings calendar (yfinance)
        if: ${{ inputs.skip_earnings != 'true' }}
        env:
          LOOKBACK: ${{ inputs.lookback_days || '90' }}
          LOOKAHEAD: ${{ inputs.lookahead_days || '180' }}
        run: |
          python tools/orb_earnings_fetcher.py \
            --lookback-days "$LOOKBACK" \
            --lookahead-days "$LOOKAHEAD"

      - name: Show diff
        run: |
          git status
          git diff --stat data/external/vix-daily.csv tools/orb_earnings_calendar.py 2>/dev/null || true

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage any changes to either feed
          git add data/external/vix-daily.csv tools/orb_earnings_calendar.py 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit -- feeds already up to date."
            exit 0
          fi
          # Build a concise commit message describing what changed
          changes=()
          if ! git diff --staged --quiet -- data/external/vix-daily.csv 2>/dev/null; then
            changes+=("VIX")
          fi
          if ! git diff --staged --quiet -- tools/orb_earnings_calendar.py 2>/dev/null; then
            changes+=("earnings")
          fi
          msg="data: refresh ${changes[*]} feeds [skip-version]"
          git commit -m "$msg" -m "Auto-refreshed by .github/workflows/refresh-data-feeds.yml"
          git push origin HEAD:main
