name: Lever Sweep (auto-trigger from file)

# Auto-fires the lever-sweep matrix when a JSON config is pushed to
# .github/sweep-trigger/<name>.json on main. Lets the AI iterate on
# discovery sweeps without a human clicking "Run workflow" each time.
#
# To trigger: commit a file like .github/sweep-trigger/round1.json
# containing a JSON array of variant objects (same schema as the
# workflow_dispatch input on lever-sweep.yml). On push to main, this
# workflow reads the changed file and dispatches the matrix.
#
# Safety: only triggers on push (no PR triggers, so a fork PR cannot
# spam matrix runs). Only the sweep-trigger directory is monitored.

on:
  push:
    branches: [main]
    paths:
      - '.github/sweep-trigger/**.json'

jobs:
  resolve-variants:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.read.outputs.variants }}
      max_parallel: ${{ steps.read.outputs.max_parallel }}
      trigger_name: ${{ steps.read.outputs.trigger_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Read most-recently-changed sweep-trigger file
        id: read
        run: |
          # Find the trigger file in this push (compare HEAD vs HEAD^).
          CHANGED=$(git diff --name-only HEAD^ HEAD -- '.github/sweep-trigger/*.json' | tail -1)
          if [ -z "$CHANGED" ]; then
            echo "no sweep-trigger file changed in this push"
            exit 1
          fi
          echo "trigger file: $CHANGED"
          TRIGGER_NAME=$(basename "$CHANGED" .json)
          # Validate JSON
          python -c "import json; json.load(open('$CHANGED'))"
          # Output for downstream job: support either a flat array or a
          # dict {variants: [...], max_parallel: N}.
          python <<EOF
          import json, os
          d = json.load(open("$CHANGED"))
          if isinstance(d, list):
              variants = d
              max_parallel = "6"
          else:
              variants = d.get("variants", [])
              max_parallel = str(d.get("max_parallel", 6))
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"variants={json.dumps(variants)}\n")
              fh.write(f"max_parallel={max_parallel}\n")
              fh.write(f"trigger_name=$TRIGGER_NAME\n")
          print(f"Resolved {len(variants)} variants from $CHANGED, max_parallel={max_parallel}")
          EOF

  sweep:
    needs: resolve-variants
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.resolve-variants.outputs.max_parallel) }}
      matrix:
        variant: ${{ fromJSON(needs.resolve-variants.outputs.variants) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install freezegun

      - name: Apply PROD_BASE + variant env overrides
        env:
          VID: ${{ matrix.variant.vid }}
          DATES_STRIDE: ${{ matrix.variant.stride }}
          VARIANT_ENV_JSON: ${{ toJSON(matrix.variant.env) }}
        run: |
          python <<'EOF'
          import json
          import os

          PROD_BASE = {
              "POST_LOSS_COOLDOWN_MIN": "30",
              "POST_LOSS_COOLDOWN_MIN_LONG": "30",
              "POST_LOSS_COOLDOWN_MIN_SHORT": "30",
              "VOLUME_GATE_ENABLED": "false",
              "V730_STOP_HYSTERESIS_ENABLED": "1",
              "V730_STOP_HYSTERESIS_BARS": "2",
              "V730_STOP_DEEP_FRAC": "0.0075",
              "V740_MFE_RATCHET_ENABLED": "1",
              "V740_MFE_RATCHET_ARM_R": "1.0",
              "V740_MFE_RATCHET_FRAC": "0.5",
              "V750_EARLY_DITCH_ENABLED": "1",
              "V750_EARLY_DITCH_WINDOW_SEC": "180",
              "V750_EARLY_DITCH_RED_DOLLARS": "10",
              "V770_POST_DITCH_COOLDOWN_ENABLED": "1",
              "V770_POST_DITCH_COOLDOWN_MIN": "30",
              "V780_OPENING_DELAY_ENABLED": "1",
              "V780_OPENING_DELAY_UNTIL_ET": "09:45",
              "V15_HARD_STRIKE_CAP": "1",
              "V15_SCALED_DI_FLOOR_ENABLED": "1",
              "V15_SCALED_DI_FLOOR": "25.0",
              "V15_REQUIRE_5M_ADX_20": "1",
              "V15_MOMENTUM_ADX_5M_MIN": "20.0",
              "V15_ALARM_E_POST_ENABLED": "1",
          }
          STATIC = {
              "VID": os.environ["VID"],
              "DATES_STRIDE": os.environ["DATES_STRIDE"],
              "WARMUP_ENABLED": "0",
              "SWEEP_WORKERS": "2",
              "SSM_SMOKE_TEST": "1",
              "TELEGRAM_BOT_TOKEN": "000:fake",
              "FMP_API_KEY": "sweep_dummy_key",
              "LOG_LEVEL": "WARNING",
          }
          raw = os.environ.get("VARIANT_ENV_JSON", "{}")
          overrides = json.loads(raw) if raw.strip() else {}

          merged = {**STATIC, **PROD_BASE, **overrides}
          path = os.environ["GITHUB_ENV"]
          with open(path, "a") as fh:
              for k, v in merged.items():
                  fh.write(f"{k}={v}\n")
          print(f"Applied: {len(STATIC)} static + {len(PROD_BASE)} prod_base + {len(overrides)} overrides")
          if overrides:
              print("Variant overrides: " + ", ".join(f"{k}={v}" for k, v in overrides.items()))
          EOF

      - name: Run sweep
        run: python tools/lever_sweep_runner.py

      - name: Commit results to sweep-results branch
        if: always()
        env:
          VID: ${{ matrix.variant.vid }}
          RUN_ID: ${{ github.run_id }}
          TRIGGER_NAME: ${{ needs.resolve-variants.outputs.trigger_name }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "lever-sweep-bot"
          STAGE=$(mktemp -d)
          if [ -d "sweep_workspace/$VID" ]; then
            cp -r "sweep_workspace/$VID" "$STAGE/$VID"
          fi
          if git ls-remote --heads origin sweep-results | grep -q sweep-results; then
            git fetch origin sweep-results --depth=1
            git checkout -B sweep-results origin/sweep-results
          else
            git checkout --orphan sweep-results
            git rm -rf . 2>/dev/null || true
            mkdir -p sweeps
            cat > README.md <<'RMEOF'
          # Lever sweep results

          Auto-generated by `.github/workflows/lever-sweep*.yml`.
          RMEOF
            git add README.md
            git commit -m "init sweep-results branch"
          fi
          DEST="sweeps/${TRIGGER_NAME}/run-${RUN_ID}/${VID}"
          mkdir -p "$DEST"
          if [ -d "$STAGE/$VID" ]; then
            cp -r "$STAGE/$VID"/* "$DEST/"
          fi
          git add "$DEST"
          git commit -m "sweep: ${TRIGGER_NAME}/${VID} (run ${RUN_ID})" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5 6; do
            if git push origin sweep-results; then
              echo "pushed on attempt $i"
              exit 0
            fi
            sleep $((2**i))
            git fetch origin sweep-results
            git rebase origin/sweep-results || git rebase --abort || true
          done
          exit 1
