name: alpaca-snapshot

# v9.1.17 -- Alpaca account snapshot stream.
#
# Pulls per-portfolio (main, val, gene) Alpaca paper account state +
# open positions + today's orders every 10 min during US RTH and
# commits the JSON to the dedicated `alpaca-live` branch. Same shape
# + same pattern as state-snapshot.yml; sister workflow.
#
# Retrieval:
#   mcp__github__get_file_contents
#     owner=valira3, repo=stock-spike-monitor,
#     path=data/alpaca/latest.json, ref=alpaca-live
#
# Required GHA secrets (read-only API keys -- paper accounts):
#   VAL_ALPACA_PAPER_KEY  / VAL_ALPACA_PAPER_SECRET
#   GENE_ALPACA_PAPER_KEY / GENE_ALPACA_PAPER_SECRET
#   [optional] MAIN_ALPACA_PAPER_KEY / MAIN_ALPACA_PAPER_SECRET
#
# When main_ creds are absent the tool falls back to VAL_ / GENE_ for
# main's read-only data pull. That's safe because the live bot's main
# book is paper-only; no real money risk in the data fetch.

on:
  schedule:
    # Match state-snapshot.yml's v9.1.6 off-peak schedule so a single
    # GH-cron contention slot covers both relays.
    - cron: "5,15,25,35,45,55 12-22 * * 1-5"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually? (logged)"
        required: false
        default: "ad-hoc dispatch"
        type: string

permissions:
  contents: write

concurrency:
  group: alpaca-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout alpaca-live branch (or create orphan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -b alpaca-live
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code origin alpaca-live >/dev/null 2>&1; then
            git fetch --depth 1 origin alpaca-live
            git reset --hard origin/alpaca-live
          fi

      - name: Fetch snapshot tool from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/tg-main
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            /tmp/tg-main
          test -f /tmp/tg-main/tools/alpaca_snapshot.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install alpaca-py
        run: |
          python -m pip install --upgrade pip
          # Pinned via requirements.txt in main so the snapshot uses
          # the same SDK version the live bot fires through.
          pip install -r /tmp/tg-main/requirements.txt

      - name: Pull Alpaca state
        env:
          VAL_ALPACA_PAPER_KEY: ${{ secrets.VAL_ALPACA_PAPER_KEY }}
          VAL_ALPACA_PAPER_SECRET: ${{ secrets.VAL_ALPACA_PAPER_SECRET }}
          GENE_ALPACA_PAPER_KEY: ${{ secrets.GENE_ALPACA_PAPER_KEY }}
          GENE_ALPACA_PAPER_SECRET: ${{ secrets.GENE_ALPACA_PAPER_SECRET }}
          MAIN_ALPACA_PAPER_KEY: ${{ secrets.MAIN_ALPACA_PAPER_KEY }}
          MAIN_ALPACA_PAPER_SECRET: ${{ secrets.MAIN_ALPACA_PAPER_SECRET }}
          ALPACA_SNAPSHOT_DIR: ${{ github.workspace }}/data/alpaca
        run: |
          set -euo pipefail
          cd /tmp/tg-main
          python -m tools.alpaca_snapshot

      - name: Commit + push snapshot
        env:
          REASON: ${{ inputs.reason }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          git config user.email "valira3@gmail.com"
          git config user.name "valira3"
          mkdir -p data/alpaca
          git add data/alpaca/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          MSG="alpaca-snapshot: ${EVENT} tick"
          if [ -n "${REASON:-}" ] && [ "${REASON}" != "ad-hoc dispatch" ]; then
            MSG="${MSG} -- ${REASON}"
          fi
          git commit -m "$MSG"
          for attempt in 1 2 3 4; do
            if git push -u origin alpaca-live; then
              echo "push OK on attempt $attempt"
              exit 0
            fi
            git fetch origin alpaca-live || true
            git rebase origin/alpaca-live || git rebase --abort
            sleep $((2 ** attempt))
          done
          echo "::error::push failed after 4 retries"
          exit 1
