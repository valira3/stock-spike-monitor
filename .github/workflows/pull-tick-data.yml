name: Pull Alpaca tick data

# v8.3.28 -- pulls historical trade ticks via Alpaca SIP and uploads
# the gzipped per-ticker-day archive to Cloudflare R2 (NOT a git branch,
# because tick data for the full year is ~10 GB compressed and would
# blow past GitHub's branch size limits).
#
# Storage layout in R2:
#   s3://$R2_BUCKET/tick-data/<YYYY-MM-DD>/<TICKER>.jsonl.gz
#
# Retrieval (replay-side):
#   aws --endpoint-url=$R2_ENDPOINT s3 cp \
#       s3://$R2_BUCKET/tick-data/2026-05-12/AMZN.jsonl.gz .
#
# Triggers:
#   1. workflow_dispatch (UI/manual) with explicit start/end/tickers
#   2. push to main on .github/tick-trigger/*.json (auto-fire pattern,
#      mirrors .github/rth-trigger/* for bars)
#
# Cost:
#   - GHA runner: ~30 min for 1-month sample, ~4-8 hr for full year
#   - Alpaca API: free (under Algo Trader Plus subscription)
#   - R2 storage: ~$0.015/GB/month (1.5 GB FY corpus -> $0.02/mo)
#   - R2 egress: free for first 10 GB/mo
#
# Why R2 instead of a git branch:
#   - 10 GB compressed tick data >> GitHub 5 GB soft limit
#   - tick data is read-only / append-only; doesn't need git's diff/merge
#   - R2 access from the replay sandbox is straightforward (aws CLI)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD inclusive)"
        required: true
        default: "2026-05-12"
      end_date:
        description: "End date (YYYY-MM-DD inclusive)"
        required: true
        default: "2026-05-12"
      tickers:
        description: "Comma-separated tickers (default: 12-ticker v10 universe)"
        required: false
        default: "AAPL,MSFT,NVDA,TSLA,META,GOOG,AMZN,AVGO,NFLX,ORCL,SPY,QQQ"
      premarket:
        description: "Include premarket trades (04:00-09:30 ET)"
        required: false
        type: choice
        options: ["false", "true"]
        default: "false"
  push:
    branches: [main]
    paths:
      - ".github/tick-trigger/**.json"

permissions:
  contents: read

concurrency:
  group: pull-tick-data
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h ceiling for full-year pulls
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Alpaca + S3 SDKs
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py boto3

      - name: Resolve params
        id: params
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "start=${{ inputs.start_date }}"   >> "$GITHUB_OUTPUT"
            echo "end=${{ inputs.end_date }}"       >> "$GITHUB_OUTPUT"
            echo "tickers=${{ inputs.tickers }}"    >> "$GITHUB_OUTPUT"
            echo "premarket=${{ inputs.premarket }}" >> "$GITHUB_OUTPUT"
          else
            # push event: pick the latest changed trigger JSON
            CHANGED=$(git diff --name-only HEAD^ HEAD -- '.github/tick-trigger/*.json' | tail -1)
            if [ -z "$CHANGED" ]; then
              echo "No tick-trigger JSON changed; nothing to do."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "start=$(jq -r '.start_date' "$CHANGED")"      >> "$GITHUB_OUTPUT"
            echo "end=$(jq -r '.end_date' "$CHANGED")"          >> "$GITHUB_OUTPUT"
            echo "tickers=$(jq -r '.tickers' "$CHANGED")"       >> "$GITHUB_OUTPUT"
            PM=$(jq -r '.premarket // "false"' "$CHANGED")
            echo "premarket=$PM" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull tick data into local archive
        if: steps.params.outputs.skip != '1'
        env:
          VAL_ALPACA_PAPER_KEY: ${{ secrets.VAL_ALPACA_PAPER_KEY }}
          VAL_ALPACA_PAPER_SECRET: ${{ secrets.VAL_ALPACA_PAPER_SECRET }}
          TG_TICKDATA_ROOT: ${{ github.workspace }}/tick-data
        run: |
          set -euo pipefail
          mkdir -p "$TG_TICKDATA_ROOT"
          PM_FLAG=""
          if [ "${{ steps.params.outputs.premarket }}" = "true" ]; then
            PM_FLAG="--premarket"
          fi
          python3 tools/fetch_alpaca_ticks.py \
            --start "${{ steps.params.outputs.start }}" \
            --end   "${{ steps.params.outputs.end }}" \
            --tickers "${{ steps.params.outputs.tickers }}" \
            --base-dir "$TG_TICKDATA_ROOT" \
            $PM_FLAG
          du -sh "$TG_TICKDATA_ROOT"

      - name: Diagnose R2 credentials (length-only, no leak)
        if: steps.params.outputs.skip != '1'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # v8.3.29 -- print length-only diagnostics so we can identify
          # swapped credentials without leaking the secret values.
          # Cloudflare R2 spec: ACCOUNT_ID 32 hex chars, ACCESS_KEY_ID 32
          # hex chars, SECRET_ACCESS_KEY 64 hex chars. A length mismatch
          # is the easiest way to spot a misconfigured secret.
          python <<'EOF'
          import os
          spec = {
              "R2_ACCOUNT_ID": 32,
              "R2_BUCKET": None,        # variable length
              "R2_ACCESS_KEY_ID": 32,
              "R2_SECRET_ACCESS_KEY": 64,
          }
          bad = []
          for k, want in spec.items():
              v = os.environ.get(k, "")
              n = len(v)
              hint = ""
              if want is not None:
                  hint = f" (expected {want})"
                  if n != want:
                      bad.append((k, n, want))
              print(f"  {k} len={n}{hint}", flush=True)
          if bad:
              print("\n::error::R2 credential length mismatch -- "
                    "secrets may be swapped or wrong.", flush=True)
              for k, n, want in bad:
                  print(f"::error::  {k} has length {n}, expected {want}",
                        flush=True)
              # Common swap: if ACCESS_KEY_ID is 64 and SECRET is 32,
              # they're literally swapped in Settings -> Secrets.
              ak = os.environ.get("R2_ACCESS_KEY_ID", "")
              sk = os.environ.get("R2_SECRET_ACCESS_KEY", "")
              if len(ak) == 64 and len(sk) == 32:
                  print("::warning::R2_ACCESS_KEY_ID (64) and "
                        "R2_SECRET_ACCESS_KEY (32) appear SWAPPED. "
                        "Swap them in Settings -> Secrets and variables.",
                        flush=True)
              elif len(ak) == 64:
                  print("::warning::R2_ACCESS_KEY_ID is 64 chars -- looks "
                        "like the SECRET key was stored in the ACCESS KEY "
                        "ID slot. Move it to R2_SECRET_ACCESS_KEY and put "
                        "the 32-char access key ID in R2_ACCESS_KEY_ID.",
                        flush=True)
              # Don't fail this step -- let the upload attempt run so
              # boto3's error gives the canonical diagnostic + the
              # artifact fallback step still kicks in on failure.
          EOF

      - name: Upload to Cloudflare R2
        id: r2_upload
        if: steps.params.outputs.skip != '1'
        continue-on-error: true   # v8.3.29 -- don't kill the job; let
                                  # the artifact fallback save the pulled
                                  # data even when R2 auth fails.
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TG_TICKDATA_ROOT: ${{ github.workspace }}/tick-data
        run: |
          python <<'EOF'
          import os, sys
          from pathlib import Path
          import boto3

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          root = Path(os.environ["TG_TICKDATA_ROOT"])

          n_files = 0
          n_bytes = 0
          for p in sorted(root.rglob("*.jsonl.gz")):
              # Map local path tick-data/<DATE>/<TK>.jsonl.gz -> remote tick-data/<DATE>/<TK>.jsonl.gz
              rel = p.relative_to(root)
              key = f"tick-data/{rel.as_posix()}"
              s3.upload_file(
                  str(p), bucket, key,
                  ExtraArgs={"ContentType": "application/gzip"},
              )
              n_files += 1
              n_bytes += p.stat().st_size
              if n_files % 50 == 0:
                  print(f"  uploaded {n_files} files, {n_bytes/1024/1024:.1f} MB", flush=True)
          print(f"DONE: uploaded {n_files} files, {n_bytes/1024/1024:.1f} MB to s3://{bucket}/tick-data/")
          EOF

      - name: Save tick data as GHA artifact (fallback when R2 fails)
        # v8.3.29 -- artifact fallback so we don't lose the Alpaca-pulled
        # data when the R2 upload step fails. Artifacts retain for 90
        # days by default; sandbox-side replay can pull via the GitHub
        # MCP / gh CLI: `gh run download <run-id> --name tick-data`.
        if: always() && steps.params.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: tick-data-${{ steps.params.outputs.start }}-to-${{ steps.params.outputs.end }}
          path: ${{ github.workspace }}/tick-data/
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job if R2 upload failed
        # v8.3.29 -- after the artifact upload safety-net runs, if the
        # R2 step had a non-zero outcome, fail the job so the run shows
        # as red in the Actions UI. The artifact will still be available
        # for retrieval.
        if: always() && steps.params.outputs.skip != '1' && steps.r2_upload.outcome == 'failure'
        run: |
          echo "::error::R2 upload step failed. Tick data is saved as a GHA artifact"
          echo "::error::on this run (see Artifacts panel). Fix the R2 credential issue"
          echo "::error::flagged in the diagnostic step above, then re-dispatch this"
          echo "::error::workflow with the same date range to push to R2."
          exit 1

      - name: Print summary
        if: always() && steps.params.outputs.skip != '1'
        run: |
          echo "Tick-data pull complete."
          echo "  range: ${{ steps.params.outputs.start }} -> ${{ steps.params.outputs.end }}"
          echo "  tickers: ${{ steps.params.outputs.tickers }}"
          echo "  R2 prefix: tick-data/<DATE>/<TICKER>.jsonl.gz"
