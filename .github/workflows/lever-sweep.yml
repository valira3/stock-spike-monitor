name: Lever Sweep

# Parallel backtest sweeps for P&L lever discovery on the v7.x corpus.
#
# How to trigger:
#   GitHub UI -> Actions -> "Lever Sweep" -> "Run workflow"
#   variants:  JSON array of {vid, env, stride} objects
#   max_parallel:  cap on concurrent jobs (default 6, max 20 on free tier)
#
# Each variant runs as its own matrix job in parallel:
#   1. Checks out main (corpus + runner)
#   2. Installs deps (incl. freezegun, which is required for determinism)
#   3. Runs tools/lever_sweep_runner.py with the variant's env overrides
#   4. Commits summary.json + per_day/*.json to the sweep-results branch
#      under sweeps/<run-id>/<vid>/
#
# Result collection:
#   git fetch origin sweep-results
#   git ls-tree origin/sweep-results -r -- 'sweeps/run-<run-id>/' | grep summary
#
# The sweep-results branch is intentionally orphan (created on first run)
# so it doesn't carry main's history.
#
# Concurrency model:
#   Each matrix job runs on its own runner -> no slot/disk contention.
#   The result-commit step retries-with-rebase to handle concurrent
#   pushes from sibling jobs.

on:
  workflow_dispatch:
    inputs:
      variants:
        description: 'JSON array: [{"vid":"v750_off","env":{"V750_EARLY_DITCH_ENABLED":"0"},"stride":"4"}]'
        required: true
        type: string
        default: |
          [{"vid": "smoke_test", "env": {}, "stride": "8"}]
      max_parallel:
        description: 'Max concurrent matrix jobs (1-20)'
        required: false
        type: string
        default: '6'

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        variant: ${{ fromJSON(inputs.variants) }}
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install freezegun

      # Write PROD_BASE defaults + this variant's overrides to GITHUB_ENV.
      # Variant overrides are written LAST so they win on duplicate keys.
      # Cannot put PROD_BASE in the next step's `env:` block because
      # step-level env beats GITHUB_ENV writes from prior steps, which
      # silently nullified V730/V740/V750/V770/cooldown overrides in
      # run-25604805581. (See run history for the bug repro: those
      # variants returned baseline numbers because the step env clobbered
      # the GITHUB_ENV overrides.)
      - name: Apply PROD_BASE + variant env overrides
        env:
          VID: ${{ matrix.variant.vid }}
          DATES_STRIDE: ${{ matrix.variant.stride }}
          VARIANT_ENV_JSON: ${{ toJSON(matrix.variant.env) }}
        run: |
          python <<'EOF'
          import json
          import os

          PROD_BASE = {
              "POST_LOSS_COOLDOWN_MIN": "30",
              "POST_LOSS_COOLDOWN_MIN_LONG": "30",
              "POST_LOSS_COOLDOWN_MIN_SHORT": "30",
              "VOLUME_GATE_ENABLED": "false",
              "V730_STOP_HYSTERESIS_ENABLED": "1",
              "V730_STOP_HYSTERESIS_BARS": "2",
              "V730_STOP_DEEP_FRAC": "0.0075",
              "V740_MFE_RATCHET_ENABLED": "1",
              "V740_MFE_RATCHET_ARM_R": "1.0",
              "V740_MFE_RATCHET_FRAC": "0.5",
              "V750_EARLY_DITCH_ENABLED": "1",
              "V750_EARLY_DITCH_WINDOW_SEC": "180",
              "V750_EARLY_DITCH_RED_DOLLARS": "10",
              "V770_POST_DITCH_COOLDOWN_ENABLED": "1",
              "V770_POST_DITCH_COOLDOWN_MIN": "30",
              "V780_OPENING_DELAY_ENABLED": "1",
              "V780_OPENING_DELAY_UNTIL_ET": "09:45",
              "V15_HARD_STRIKE_CAP": "1",
              "V15_SCALED_DI_FLOOR_ENABLED": "1",
              "V15_SCALED_DI_FLOOR": "25.0",
              "V15_REQUIRE_5M_ADX_20": "1",
              "V15_MOMENTUM_ADX_5M_MIN": "20.0",
              "V15_ALARM_E_POST_ENABLED": "1",
          }
          STATIC = {
              "VID": os.environ["VID"],
              "DATES_STRIDE": os.environ["DATES_STRIDE"],
              "WARMUP_ENABLED": "0",
              "SWEEP_WORKERS": "2",
              "SSM_SMOKE_TEST": "1",
              "TELEGRAM_BOT_TOKEN": "000:fake",
              "FMP_API_KEY": "sweep_dummy_key",
              "LOG_LEVEL": "WARNING",
          }
          raw = os.environ.get("VARIANT_ENV_JSON", "{}")
          overrides = json.loads(raw) if raw.strip() else {}

          merged = {**STATIC, **PROD_BASE, **overrides}
          path = os.environ["GITHUB_ENV"]
          with open(path, "a") as fh:
              for k, v in merged.items():
                  fh.write(f"{k}={v}\n")
          print(f"Applied: {len(STATIC)} static + {len(PROD_BASE)} prod_base + {len(overrides)} overrides")
          if overrides:
              print("Variant overrides: " + ", ".join(f"{k}={v}" for k, v in overrides.items()))
          EOF

      # Runner step has NO env: block — env comes entirely from
      # GITHUB_ENV writes in the previous step.
      - name: Run sweep
        run: python tools/lever_sweep_runner.py

      - name: Commit results to sweep-results branch
        if: always()
        env:
          VID: ${{ matrix.variant.vid }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "lever-sweep-bot"
          # Save artifacts from the working tree before switching branches.
          STAGE=$(mktemp -d)
          if [ -d "sweep_workspace/$VID" ]; then
            cp -r "sweep_workspace/$VID" "$STAGE/$VID"
          fi
          # Switch to (or create) sweep-results.
          if git ls-remote --heads origin sweep-results | grep -q sweep-results; then
            git fetch origin sweep-results --depth=1
            git checkout -B sweep-results origin/sweep-results
          else
            git checkout --orphan sweep-results
            git rm -rf . 2>/dev/null || true
            mkdir -p sweeps
            cat > README.md <<'RMEOF'
          # Lever sweep results

          Auto-generated by `.github/workflows/lever-sweep.yml`. Each subdir
          under `sweeps/run-<id>/` is one workflow run; each subdir under
          that is one variant.
          RMEOF
            git add README.md
            git commit -m "init sweep-results branch"
          fi
          DEST="sweeps/run-$RUN_ID/$VID"
          mkdir -p "$DEST"
          if [ -d "$STAGE/$VID" ]; then
            cp -r "$STAGE/$VID"/* "$DEST/"
          fi
          git add "$DEST"
          git commit -m "sweep: $VID (run $RUN_ID)" || { echo "no changes"; exit 0; }
          # Retry-with-rebase to handle concurrent matrix pushes.
          for i in 1 2 3 4 5 6; do
            if git push origin sweep-results; then
              echo "pushed on attempt $i"
              exit 0
            fi
            sleep $((2**i))
            git fetch origin sweep-results
            git rebase origin/sweep-results || git rebase --abort || true
          done
          echo "push failed after retries"
          exit 1
