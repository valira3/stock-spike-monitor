name: dashboard-monitor

# RTH live-dashboard validator. Polls the production dashboard's read
# endpoints every 5 min during US market hours and runs a battery of
# invariants. On violation:
#   - Posts a Telegram alert to TELEGRAM_ADMIN_CHAT_ID
#   - Files a GitHub issue with full diagnostic context (tagged @claude
#     so the Claude Code GitHub app drafts a fix PR)
#
# All side effects are read-only against production. The monitor never
# writes back to the bot.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions).
# v7.68.0: auth is now via the dashboard's login form (POST /login with
# DASHBOARD_PASSWORD), matching the operator's browser flow. All four
# secrets below use the operator's existing GHA names.
#   DASHBOARD_URL               e.g. https://tradegenius.up.railway.app
#   DASHBOARD_PASSWORD          same login password the live bot has on
#                               Railway under DASHBOARD_PASSWORD env
#   TELEGRAM_TP_TOKEN           existing TG bot token (reused from the bot)
#   TELEGRAM_TP_CHAT_ID         chat id to post alerts to
#
# Built-in GITHUB_TOKEN handles the issue-filing scope (issues: write).
#
# Manual run: Actions -> dashboard-monitor -> Run workflow (button up
# top right). Useful for dry-run validation before relying on the cron.

on:
  schedule:
    # Cron is UTC. v7.67.0 -- extended to cover US premarket through RTH.
    # v7.70.0 -- bumped from */5 to */10 and offset away from :00.
    # GitHub Actions documents that the scheduled-event delivery can
    # be DELAYED or SKIPPED entirely during high load (especially at
    # the top of the hour), so dropping to */10 with a :07 offset
    # cuts the at-risk slot count in half and avoids the :00 spike
    # period. See https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    # Premarket: 04:00 -> 09:30 ET = 08:00 -> 13:30 UTC (EDT) / 09:00 -> 14:30 UTC (EST)
    # RTH:       09:30 -> 16:00 ET = 13:30 -> 20:00 UTC (EDT) / 14:30 -> 21:00 UTC (EST)
    # Union covering both seasons (DST-safe): 08:00 -> 20:57 UTC, Mon-Fri.
    # 7-57/10 covers 08:07, 08:17, ..., 20:57 (6 ticks/hr). Edge hours
    # before EDT premarket open or after EST RTH close fall on
    # weekends/PRE/POST mode so the invariants short-circuit
    # (v10_live_mode_on skips when regime mode isn't RTH).
    # Per-day firings: 13 hours x 6/hr = 78 GHA minutes/day at worst.
    - cron: "7-57/10 8-20 * * 1-5"
  push:
    # v7.80.0 -- run the monitor on every push to main. Two reasons:
    # (1) GitHub has been silently dropping the scheduled cron for
    #     this workflow (operator's Actions tab shows zero runs from
    #     the `schedule` event despite the cron being correctly
    #     declared). Running on push gives us guaranteed exercise
    #     during active development -- we've been merging ~10 PRs/day,
    #     so the monitor effectively runs every time a release lands.
    # (2) Each push acts as a "kick" to GHA's scheduler that
    #     sometimes revives a stalled cron registration.
    # Only fires on changes to the monitor itself OR known live-state
    # files; a doc-only commit to ARCHITECTURE.md still won't trigger.
    branches: [main]
    paths:
      - "tools/dashboard_monitor*.py"
      - "tools/railway_log_tail.py"
      - ".github/workflows/dashboard-monitor.yml"
      - "bot_version.py"
      - "trade_genius.py"
      - "dashboard_server.py"
      - "engine/scan.py"
      - "engine/portfolio_book.py"
      - "engine/portfolio_equity.py"
      - "orb/**.py"
      - "broker/**.py"
      - "executors/**.py"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run -- print diagnostics, no Telegram/issue side effects"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  issues: write

concurrency:
  # Don't pile up monitor runs if a long one is still going.
  group: dashboard-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # v7.80.0 -- on push events, give Railway 2min to roll out the
      # new code before we hit /api/state. Otherwise the monitor
      # validates the OLD container and reports stale state. No-op
      # for schedule/workflow_dispatch events.
      - name: Wait for Railway rollout (push only)
        if: github.event_name == 'push'
        run: sleep 120

      - name: Run dashboard monitor
        env:
          # v7.68.0 -- auth is via POST /login with DASHBOARD_PASSWORD,
          # matching the browser flow. Operator's existing GHA secret
          # names map to the script's neutral env var contract here.
          DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TP_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_TP_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          MONITOR_DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
          # v7.70.0 -- silent Telegram heartbeat (one ping per active
          # hour, at the :07 tick) so the operator gets positive
          # proof-of-life when no invariants fire. Set to "" to mute.
          MONITOR_HEARTBEAT: "1"
          # v7.79.0 -- Railway log-tail credentials for the
          # inv_railway_logs_clean invariant. Both must be present for
          # the invariant to scan; missing values produce an OK-skip.
          # RAILWAY_API_TOKEN: project or personal token from Railway
          #   dashboard -> account -> tokens.
          # RAILWAY_SERVICE_ID: the service UUID, visible in the
          #   Railway dashboard URL when viewing the service.
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          python -m tools.dashboard_monitor
