name: dashboard-monitor

# RTH live-dashboard validator. Polls the production dashboard's read
# endpoints every 5 min during US market hours and runs a battery of
# invariants. On violation:
#   - Posts a Telegram alert to TELEGRAM_ADMIN_CHAT_ID
#   - Files a GitHub issue with full diagnostic context (tagged @claude
#     so the Claude Code GitHub app drafts a fix PR)
#
# All side effects are read-only against production. The monitor never
# writes back to the bot.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions).
# v7.66.0: workflow uses the operator's existing GHA secret names; the
# Python script's internal env var names are mapped via this workflow.
#   DASHBOARD_URL               e.g. https://tradegenius.up.railway.app
#   DASHBOARD_SESSION_SECRET    hex; same value the live bot uses for
#                               DASHBOARD_SESSION_SECRET env var on Railway
#   TELEGRAM_TP_TOKEN           existing TG bot token (reused from the bot)
#   TELEGRAM_TP_CHAT_ID         chat id to post alerts to
#
# Built-in GITHUB_TOKEN handles the issue-filing scope (issues: write).
#
# Manual run: Actions -> dashboard-monitor -> Run workflow (button up
# top right). Useful for dry-run validation before relying on the cron.

on:
  schedule:
    # Cron is UTC. v7.67.0 -- extended to cover US premarket through RTH.
    # Premarket: 04:00 -> 09:30 ET = 08:00 -> 13:30 UTC (EDT) / 09:00 -> 14:30 UTC (EST)
    # RTH:       09:30 -> 16:00 ET = 13:30 -> 20:00 UTC (EDT) / 14:30 -> 21:00 UTC (EST)
    # Union covering both seasons (DST-safe): 08:00 -> 20:55 UTC, Mon-Fri.
    # */5 8-20 covers 08:00, 08:05, ..., 20:55. Edge hours before EDT
    # premarket open or after EST RTH close fall on weekends/PRE/POST mode
    # so the invariants short-circuit (v10_live_mode_on skips when
    # regime mode isn't RTH).
    # Per-day firings: 13 hours x 12/hr = 156 GHA minutes/day at worst.
    - cron: "*/5 8-20 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run -- print diagnostics, no Telegram/issue side effects"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  issues: write

concurrency:
  # Don't pile up monitor runs if a long one is still going.
  group: dashboard-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run dashboard monitor
        env:
          # v7.66.0 -- map operator's existing GHA secret names onto the
          # script's internal env var contract. Keeps tools/dashboard_monitor.py
          # provider-agnostic (it can be run locally with any naming).
          DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.DASHBOARD_SESSION_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TP_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_TP_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          MONITOR_DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
        run: |
          python -m tools.dashboard_monitor
