name: trade-replay

# v7.93.0 -- on-demand per-trade report.
#
# Hits the running bot's /api/trade_log endpoint (auth via
# DASHBOARD_PASSWORD), pulls every closed-trade row for the
# requested day, and renders a markdown table + summary stats
# (total P&L, win rate, avg R-multiple, biggest winner / loser).
# Optionally embeds a Railway log slice grepping for
# [ENTRY] / [TRADE_CLOSED] / [V79-ORB-EXIT] / [V10-FIRE] /
# [SIGNAL-BUS-EMIT] / [V79-MIRROR-RECV] lines so the report
# carries forensic context alongside the broker-shape data.
#
# Output: written to GHA step summary (visible inline on the
# workflow run page) AND uploaded as a `trade-replay-<since>.md`
# artifact for download.
#
# This is workflow_dispatch only -- it's a debug / analysis tool,
# not a guard. Run it when you want to see how a day played out.

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Day to report (YYYY-MM-DD, default = today ET)"
        required: false
        default: ""
      limit:
        description: "Max trade-log rows to pull (1-5000)"
        required: false
        default: "500"
      include_logs:
        description: "Include Railway log slice in the report"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run trade replay
        env:
          DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          SINCE: ${{ inputs.since }}
          LIMIT: ${{ inputs.limit }}
          INCLUDE_LOGS: ${{ inputs.include_logs == 'true' && '1' || '' }}
          ARTIFACT_PATH: trade_replay.md
        run: |
          python -m tools.trade_replay

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-replay-${{ inputs.since || 'today' }}
          path: trade_replay.md
          if-no-files-found: warn
          retention-days: 30
