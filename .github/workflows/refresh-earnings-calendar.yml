name: Refresh Earnings Calendar

on:
  # Every Monday at 06:00 UTC (02:00 ET) -- well before RTH
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger (emergency refresh before an earnings event)
  workflow_dispatch:
    inputs:
      weeks:
        description: "Weeks ahead to fetch (default 16)"
        required: false
        default: "16"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated calendar file

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas --quiet

      - name: Refresh calendar
        run: |
          WEEKS=${{ github.event.inputs.weeks || '16' }}
          python scripts/refresh_earnings_calendar.py --weeks $WEEKS

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet tools/orb_earnings_calendar.py || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "valira3"
          git config user.email "valira3@gmail.com"
          git add tools/orb_earnings_calendar.py
          git commit -m "chore: refresh earnings calendar $(date -u +%Y-%m-%d)"
          git push origin main
          echo "Calendar updated and pushed -- Railway will redeploy automatically."

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "Earnings calendar already up to date."
