# v6.9.0: pyarrow added to requirements.txt for Parquet bar/indicator cache.
# See requirements.txt -- adding here as a comment since this project
# uses requirements.txt as the primary dependency manifest.

[tool.ruff]
# v5.8.4: minimal ruff config so preflight.sh's [5/5] format check
# tolerates the pre-v5.8.4 codebase. The legacy `trade_genius.py`
# accumulated a number of long-standing F401/F841/E70x/E741/F821
# patterns; a future cleanup PR can drop these. New files are still
# held to ruff's defaults because they don't trigger any of these.
line-length = 100
target-version = "py311"

# Both `ruff check` and `ruff format` consult this top-level exclude.
# trade_genius.py is the legacy 12k-line module that predates ruff
# in this repo; reformatting it is out of scope for this PR.
extend-exclude = ["trade_genius.py"]
force-exclude = true

[tool.ruff.lint]
ignore = [
    "E402",  # module-level import not at top of file
    "E701",  # multiple statements on one line (colon)
    "E702",  # multiple statements on one line (semicolon)
    "E741",  # ambiguous variable name
    "F401",  # imported but unused
    "F821",  # undefined name (false positive on dynamic globals lookup)
    "F841",  # local variable assigned but never used
]
